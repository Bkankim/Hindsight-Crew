# Hindsight-Crew stack (verified against hindsight v0.8.3).
# Hindsight bundles an EMBEDDED Postgres (pg0) at /home/hindsight/.pg0 — NO separate
# postgres service. It runs rootless (UID 1000); pg0 needs a NAMED volume (host binds
# break permissions on macOS/non-1000 hosts). hindsight is INTERNAL-only; the gateway is
# the single host-published front door. Pin images by digest in .env.local.
services:
  hindsight:
    image: ${HC_HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest}
    env_file:
      - path: ./.env.local
        required: false
    environment:
      # MCP Bearer auth — the gateway holds this same value; clients never get it.
      HINDSIGHT_API_MCP_AUTH_TOKEN: ${HC_HINDSIGHT_API_KEY:?set HC_HINDSIGHT_API_KEY (bootstrap seeds it)}
      # LLM for fact-extraction. cpu-en/offline path uses "none" (raw store + semantic recall,
      # no external cloud, no extra model). ko-full/gpu can switch to ollama/llamacpp.
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-none}
      # Embeddings + reranker from the selected profile (local provider on cpu-en).
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-local}
      HINDSIGHT_API_EMBEDDINGS_MODEL: ${HINDSIGHT_API_EMBEDDINGS_MODEL:-BAAI/bge-small-en-v1.5}
      HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:-local}
      HINDSIGHT_API_RERANKER_MODEL: ${HINDSIGHT_API_RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
    expose: ["8888"]               # internal only — NOT published to host
    volumes:
      - pg0:/home/hindsight/.pg0   # embedded Postgres data (named volume, UID-1000 safe)
      - hfcache:/home/hindsight/.cache/huggingface
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8888/health').status==200 else 1)\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60                  # first boot downloads embedding/reranker models
      start_period: 30s

  gateway:
    build: ./gateway
    command: ["python", "-m", "gateway.server"]
    depends_on:
      hindsight:
        condition: service_healthy
    env_file:
      - path: ./.env.local
        required: false
    environment:
      HC_UPSTREAM_BASE: http://hindsight:8888
      HC_HINDSIGHT_API_KEY: ${HC_HINDSIGHT_API_KEY:?}
      HC_ACL_FILE: /secrets/acl.json
      HC_AUDIT_LOG: /audit/gateway.log
      HC_ATTRIBUTION_MODE: ${HC_ATTRIBUTION_MODE:-body-inject}
    ports:
      - "${HC_GATEWAY_BIND:-127.0.0.1:8888}:8888"
    volumes:
      - ./secrets:/secrets:ro
      - ./audit:/audit
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pg0:
  hfcache:
